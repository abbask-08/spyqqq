# SPY/QQQ paper-trading bot configuration.
# The backtest and the live bot read this same file — one source of truth.

symbols:
  - SPY
  - QQQ

strategy:
  sma_period: 200        # regime filter: long only while close > SMA
  rsi_period: 2
  rsi_buy_below: 10.0    # entry: RSI(2) below this while in regime
  rsi_exit_above: 65.0   # exit: RSI(2) above this
  max_hold_days: 10      # exit: trading days in position
  atr_period: 14
  atr_stop_mult: 3.0     # catastrophe stop distance in ATRs below entry

risk:
  weight_per_symbol: 0.45      # fraction of equity per symbol before posture clamp
  max_drawdown_halt: 0.15      # halt new entries if equity falls this far from peak
  max_consecutive_losses: 3    # halt new entries after this many losing closes

execution:
  entry_window_minutes: 75     # only open new positions this close to the bell;
                               # a delayed catch-up run manages exits but won't
                               # enter on an untested mid-morning signal

posture:
  file: posture/posture.json
  stale_hours: 24
  caps:                        # max TOTAL gross exposure by posture
    RISK_ON: 0.90
    NEUTRAL: 0.50
    RISK_OFF: 0.00
  default: NEUTRAL             # used when posture.json is missing/stale/invalid

backtest:
  start: "2000-01-03"
  in_sample_end: "2015-12-31"  # walk-forward split boundary
  slippage_bps: 7.5            # per side
  spread_cents: 1.0            # full spread; half is paid per side
  initial_cash: 100000

paths:
  state_file: logs/bot_state.json
  trades_csv: logs/trades.csv
  equity_csv: logs/equity_curve.csv
  signals_csv: logs/signals.csv
  history_dir: data
